apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  DB_HOST: {{ required "db.host is required" .Values.db.host | quote }}
  DB_PORT: {{ default 5432 .Values.db.port | quote }}
  DB_NAME: {{ required "db.name is required" .Values.db.name | quote }}
  DB_USER: {{ required "db.user is required" .Values.db.user | quote }}
  DB_PASSWORD: {{ required "db.password is required" .Values.db.password | quote }}
  DB_SSLMODE: {{ default "require" .Values.db.sslmode | quote }}
