name: Deploy bss-partner-management-services

on:
  push:
    branches: [ dev,main ]   # adjust to your flow
    paths:
      - "src/**"
      - "pom.xml"
      - "infra/**"
      - ".github/workflows/deployment.yml"
  workflow_dispatch:

# Avoid overlapping deploys to the same env
concurrency:
  group: bss-partner-management-services-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REPO: bss-partner-management-services
  IMAGE_TAG: ${{ github.sha }}
  CHART_PATH: infra/helm/bss-partner-management-services
  HELM_RELEASE: bss-partner-management-services
  K8S_NAMESPACE: dev
  VALUES_FILE: values-dev.yaml

jobs:
  build-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify
        run: mvn -B -DskipTests=false verify

      - name: Upload JAR (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  build-and-push:
    name: Build Docker & Push to ECR
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write     # OIDC to assume AWS role
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (assume deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}   # e.g. arn:aws:iam::2740...:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          DOCKER_IMAGE=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}
          docker build -t $DOCKER_IMAGE:${{ env.IMAGE_TAG }} .
          # also tag with branch name (sanitized)
          BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          docker tag $DOCKER_IMAGE:${{ env.IMAGE_TAG }} $DOCKER_IMAGE:${BRANCH}
          echo "IMAGE_URI=$DOCKER_IMAGE:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: Push image
        run: |
          DOCKER_IMAGE=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}
          docker push $DOCKER_IMAGE:${{ env.IMAGE_TAG }}
          BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          docker push $DOCKER_IMAGE:${BRANCH}

  deploy:
    name: Helm Upgrade (EKS dev)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_NAME }}  # e.g. kfonbss-dev-eks
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "${{ env.AWS_REGION }}"

      - name: Helm dependency build (if any)
        working-directory: ${{ env.CHART_PATH }}
        run: helm dependency build || true

      - name: Deploy with Helm (set image repo & tag)
        working-directory: ${{ env.CHART_PATH }}
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} . \
            -n ${{ env.K8S_NAMESPACE }} \
            -f ${{ env.VALUES_FILE }} \
            --set image.repository=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --wait --timeout 10m

      - name: Rollout status
        run: kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deploy/${{ env.HELM_RELEASE }}
