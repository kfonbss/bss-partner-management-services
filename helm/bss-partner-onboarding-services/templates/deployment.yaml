
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Values.app}}
  namespace: {{.Values.namespace}}
spec:
  replicas: {{.Values.replicaCount}}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{.Values.app}}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{.Values.app}}
        repository: {{.Values.image.repository}}
    spec:
      containers:
        - name:  {{.Values.app}}
          image: {{.Values.image.name}}:{{.Values.image.tag}}
          imagePullPolicy: {{.Values.image.pullPolicy}}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{.Values.application.config.profile}}
            - name: MDMS_SERVICE_HOST
              value: {{.Values.application.config.mdms_url}}

            - name: IDGEN_SERVICE_HOST
              value: {{.Values.application.config.idgen_url}}

            - name: FILE_SERVICE_HOST
              value: {{.Values.application.config.file_url}}

            - name: DMDM_SERVICE_HOST
              value: {{.Values.application.config.dmdm_url}}

            - name: PDF_SERVICE_HOST
              value: {{.Values.application.config.pdf_url}}

            - name: SMS_SERVICE_HOST
              value: {{.Values.application.config.sms_url}}

            - name: OTP_SERVICE_HOST
              value: {{.Values.application.config.otp_url}}

            - name: URLSHORTENING_SERVICE_HOST
              value: {{.Values.application.config.urlshortening_url}}

            - name: RESUBMIT_TOPIC
              value: {{.Values.application.config.file_resubmit_topic}}

            - name: CREATE_TOPIC
              value: {{.Values.application.config.file_create_topic}}
            - name: UPDATE_TOPIC
              value: {{.Values.application.config.file_update_topic}}

            - name: POSTGRES_URL
              value: {{.Values.application.config.database_url}}
            - name: POSTGRES_USER
              value: {{.Values.application.config.database_user}}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: SERVICE_BUCKET
              value: {{.Values.application.config.service_bucket}}
            - name: REPORT_BUCKET
              value: {{.Values.application.config.report_bucket}}
            - name: DATA_BUCKET
              value: {{.Values.application.config.data_bucket}}
            - name: FEEDBACK_BUCKET
              value: {{.Values.application.config.feedback_bucket}}
            - name: SERVICE_ROLE
              value: {{.Values.serviceAccount.roleArn}}
            - name: AWS_REGION
              value: {{.Values.application.config.region}}
            - name: CDN_URL
              value: {{.Values.application.config.cdn_lb_url}}
            - name: MASS_URL
              value: {{.Values.application.config.petition_lb_url}}
            - name: DELETE_URL
              value: {{.Values.application.config.delete_lb_url}}
            - name: EDIT_URL
              value: {{.Values.application.config.edit_lb_url}}
            - name: DECLARATION_URL
              value: {{.Values.application.config.whatsapp_lb_url}}
            - name: DOMAIN_URL
              value: {{.Values.application.config.domain_url}}
            - name: KAFKA_SERVERS
              value: {{.Values.application.config.kafka_servers}}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: encryption-keys
                  key: JWT_SECRET
          ports:
            - containerPort: {{.Values.service.port}}
          {{- if .Values.resources }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          {{- end }}
      serviceAccountName: {{.Values.serviceAccount.name}}
